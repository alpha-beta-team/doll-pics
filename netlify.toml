# Canonical host: www → apex (force so it runs before SPA rules)
[[redirects]]
  from = "https://www.dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

# Admin SPA: client routes need the app shell.
[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# Static files (e.g. /work/index.html) are served first.
# Unknown paths return the 404 page with a real HTTP 404 status.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
