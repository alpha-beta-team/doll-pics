# Canonical host: www → apex (force so it runs before SPA rules)
[[redirects]]
  from = "https://www.dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://dollpictures.in/*"
  to = "https://dollpictures.in/:splat"
  status = 301
  force = true

# Live sitemap from CMS API (CMS publish — no frontend rebuild).
# public/_redirects is also written at prebuild from VITE_API_URL.
[[redirects]]
  from = "/sitemap.xml"
  to = "https://photography-cms-backend.onrender.com/api/sitemap.xml"
  status = 200
  force = true

# Admin SPA: client routes need the app shell.
[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200

# SPA fallback: prerendered folders (filesystem) win first.
# Unknown paths — including new CMS landings — get the app shell (200).
# React LandingResolver renders the page or NotFound (noindex).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
